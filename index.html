<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳士考試資源整合入口</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --header-bg: #1f1f1f;
            --card-bg: #222222;
            --item-bg: #2d2d2d;
            --primary-color: #2980b9;
            --primary-hover: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* 網格排版：模擬圖片中的對齊與欄位結構 */
        .layout-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        /* 純文字標題設計 */
        .header-text {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #ffffff;
            background-color: var(--header-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* 連結按鈕設計 */
        .link-card {
            background-color: var(--item-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-card:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-hover);
            color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(41, 128, 185, 0.4);
        }

        /* 隱藏空缺的網格區域保持版面平衡 */
        .empty-slot {
            visibility: hidden;
        }

        /* 手機版排版微調，保留雙欄但縮小間距與字體 */
        @media (max-width: 600px) {
            .layout-container {
                padding: 15px;
                gap: 10px;
            }
            .header-text {
                font-size: 18px;
                padding: 12px 8px;
            }
            .link-card {
                font-size: 16px;
                padding: 15px 10px;
            }
        }
    </style>
</head>
<body>

    <h1>記帳士考試資源整合入口</h1>

    <div class="layout-container">
        <div class="header-text">歷屆題目查詢</div>
        <div class="header-text">法規查詢</div>

        <a href="https://wu0205n.github.io/ExamViewer_Bookkeeping/" target="_blank" class="link-card">記帳相關法規概要</a>
        <a href="https://wu0205n.github.io/law_search_Bookkeeping/" target="_blank" class="link-card">記帳相關法規概要</a>

        <a href="https://wu0205n.github.io/ExamViewer_Tax/" target="_blank" class="link-card">稅務相關法規概要</a>
        <a href="https://wu0205n.github.io/Law_Search_Tax/" target="_blank" class="link-card">稅務相關法規概要</a>

        <a href="https://wu0205n.github.io/ExamViewer_Accounting/" target="_blank" class="link-card">會計學概要</a>
        <div class="empty-slot"></div>
    </div>

</body>
</html>
